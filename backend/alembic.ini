[alembic]
script_location = alembic
prepend_sys_path = .

# NOTE: This URL is the fallback ONLY when running alembic directly without
# environment variables. In all normal operation (docker compose, CI) the
# DATABASE_URL env var is set and alembic/env.py overrides this value.
# Do NOT rely on this URL in production.
sqlalchemy.url = postgresql+asyncpg://vlsi:vlsi@localhost:5432/vlsi_interview

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
