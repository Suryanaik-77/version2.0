# ══════════════════════════════════════════════════════════════════════
# nginx.conf — VLSI Interview Platform V2
# ══════════════════════════════════════════════════════════════════════
#
# Deployment modes:
#   HTTP only (default):  uncomment the HTTP server block at bottom.
#   HTTPS:                place fullchain.pem + privkey.pem in docker/ssl/
#                         and uncomment the HTTPS server block.
#
# WebSocket config:
#   proxy_read_timeout 3600s — interview sessions run up to 1 hour
#   Upgrade headers on /ws/* paths
#
# ══════════════════════════════════════════════════════════════════════

worker_processes auto;
worker_rlimit_nofile 65535;
error_log /var/log/nginx/error.log warn;
pid /tmp/nginx.pid;

events {
    worker_connections 4096;
    multi_accept on;
    use epoll;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # ── Logging ──────────────────────────────────────────────────────────────
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" '
                    'rt=$request_time ut=$upstream_response_time';

    access_log /var/log/nginx/access.log main;

    # ── Performance ──────────────────────────────────────────────────────────
    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout 65;
    gzip            on;
    gzip_vary       on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml application/xml+rss text/javascript;

    # ── Rate limiting ─────────────────────────────────────────────────────────
    limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=10r/m;
    limit_req_zone $binary_remote_addr zone=api_limit:10m  rate=120r/m;

    # ── Upstream ──────────────────────────────────────────────────────────────
    upstream backend {
        server backend:8000;
        keepalive 32;
    }

    upstream frontend {
        server frontend:80;
        keepalive 16;
    }

    # ══════════════════════════════════════════════════════════════════════════
    # HTTP server
    # For HTTPS: replace this block's content with: return 301 https://$host$request_uri;
    # ══════════════════════════════════════════════════════════════════════════
    server {
        listen 80;
        server_name _;

        # Security headers (also applied on HTTPS block if enabled)
        add_header X-Frame-Options DENY always;
        add_header X-Content-Type-Options nosniff always;
        add_header Referrer-Policy strict-origin-when-cross-origin always;
        add_header Permissions-Policy "microphone=(self), camera=(), geolocation=()" always;
        add_header Content-Security-Policy "default-src 'self'; connect-src 'self' wss: ws:; media-src 'self' blob:; img-src 'self' data:; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; script-src 'self'" always;

        # ── Auth (rate limited) ───────────────────────────────────────────────
        location ~ ^/auth/(login|register|forgot-password|reset-password) {
            limit_req zone=auth_limit burst=5 nodelay;
            limit_req_status 429;
            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ── WebSocket (long timeout, no buffering) ────────────────────────────
        location /ws/ {
            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_read_timeout  3600s;
            proxy_send_timeout  3600s;
            proxy_connect_timeout 30s;
            proxy_buffering off;
            proxy_cache    off;
        }

        # ── Backend API paths ─────────────────────────────────────────────────
        location ~ ^/(auth|health|sessions|admin|reviewer|integrity) {
            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ── Static assets (long cache) ────────────────────────────────────────
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            proxy_pass http://frontend;
            expires 1y;
            add_header Cache-Control "public, immutable";
        }

        # ── Health (no log) ───────────────────────────────────────────────────
        location /health {
            proxy_pass http://backend;
            access_log off;
        }

        # ── Frontend SPA (catch-all) ──────────────────────────────────────────
        location / {
            proxy_pass http://frontend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_intercept_errors on;
            error_page 404 = /index.html;
        }
    }

    # ══════════════════════════════════════════════════════════════════════════
    # HTTPS server — uncomment when TLS certs are in docker/ssl/
    # ══════════════════════════════════════════════════════════════════════════
    # server {
    #     listen 443 ssl http2;
    #     server_name _;
    #
    #     ssl_certificate     /etc/ssl/vlsi/fullchain.pem;
    #     ssl_certificate_key /etc/ssl/vlsi/privkey.pem;
    #     ssl_protocols       TLSv1.2 TLSv1.3;
    #     ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    #     ssl_prefer_server_ciphers off;
    #     ssl_session_cache   shared:SSL:10m;
    #     ssl_session_timeout 1d;
    #
    #     add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    #     # ... same location blocks as HTTP server above ...
    # }
}
