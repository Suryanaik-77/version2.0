version: "3.9"

# ══════════════════════════════════════════════════════════════════════
# VLSI Interview Platform V2 — Production Compose
# ══════════════════════════════════════════════════════════════════════
#
# Services:
#   postgres  — PostgreSQL 16
#   redis     — Redis 7 (sessions + pub/sub)
#   backend   — FastAPI (uvicorn, uvloop)
#   frontend  — Vite build served by nginx-alpine
#   nginx     — Reverse proxy, WebSocket upgrade
#   migrate   — Alembic migration (runs once, then exits)
#
# Startup order: postgres + redis → migrate → backend → nginx
#
# Quick start:
#   cp .env.example .env
#   # Fill in POSTGRES_PASSWORD, REDIS_PASSWORD, JWT_SECRET_KEY, OPENAI_API_KEY
#   docker compose up -d
#
# For HTTPS:
#   Place fullchain.pem + privkey.pem in docker/ssl/
#   Uncomment the HTTPS server block in docker/nginx/nginx.conf
# ══════════════════════════════════════════════════════════════════════

services:

  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER:     ${POSTGRES_USER:-vlsi}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB:       ${POSTGRES_DB:-vlsi_interview}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-vlsi} -d ${POSTGRES_DB:-vlsi_interview}"]
      interval: 10s
      timeout:  5s
      retries:  5
      start_period: 30s
    networks:
      - internal

  # ── Redis ───────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: >
      redis-server
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
      --save 60 1000
      --requirepass ${REDIS_PASSWORD}
      --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout:  5s
      retries:  5
    networks:
      - internal

  # ── Alembic migrations (run once) ───────────────────────────────────────────
  migrate:
    build:
      context: ./backend
      dockerfile: ../docker/Dockerfile.backend
      target: production
    command: alembic upgrade head
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-vlsi}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-vlsi_interview}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - internal
    restart: "no"

  # ── Backend ─────────────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: ../docker/Dockerfile.backend
      target: production
    restart: unless-stopped
    environment:
      DATABASE_URL:               postgresql+asyncpg://${POSTGRES_USER:-vlsi}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-vlsi_interview}
      REDIS_URL:                  redis://:${REDIS_PASSWORD}@redis:6379/0
      REDIS_PUBSUB_URL:           redis://:${REDIS_PASSWORD}@redis:6379/1
      JWT_SECRET_KEY:             ${JWT_SECRET_KEY}
      JWT_EXPIRE_MINUTES:         ${JWT_EXPIRE_MINUTES:-120}
      REFRESH_TOKEN_EXPIRE_DAYS:  ${REFRESH_TOKEN_EXPIRE_DAYS:-7}
      OPENAI_API_KEY:             ${OPENAI_API_KEY}
      OPENAI_MODEL:               ${OPENAI_MODEL:-gpt-4o-mini}
      MISTRAL_API_KEY:            ${MISTRAL_API_KEY:-}
      INWORLD_API_KEY:            ${INWORLD_API_KEY:-}
      ENVIRONMENT: production
      DEBUG: "false"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout:  5s
      retries:  3
      start_period: 30s
    networks:
      - internal
    stop_grace_period: 30s

  # ── Frontend ────────────────────────────────────────────────────────────────
  # VITE_API_URL and VITE_WS_URL are baked into the JS bundle at build time.
  # For same-origin nginx deployment, leave them blank (frontend falls back to
  # window.location.host for WS and same-origin for REST).
  frontend:
    build:
      context: ./frontend
      dockerfile: ../docker/Dockerfile.frontend
      args:
        VITE_API_URL: ${VITE_API_URL:-}
        VITE_WS_URL:  ${VITE_WS_URL:-}
    restart: unless-stopped
    networks:
      - internal

  # ── Nginx ───────────────────────────────────────────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      # conf.d/ directory exists (contains .keep placeholder)
      # Add site-specific overrides here if needed
      - ./docker/nginx/conf.d:/etc/nginx/conf.d:ro
      # TLS: place fullchain.pem + privkey.pem here before enabling HTTPS
      - ./docker/ssl:/etc/ssl/vlsi:ro
      - nginx_logs:/var/log/nginx
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_started
    networks:
      - internal
      - external

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  nginx_logs:
    driver: local

networks:
  internal:
    driver: bridge
    internal: true
  external:
    driver: bridge
