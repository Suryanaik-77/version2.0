# Internal frontend server — serves Vite SPA build
# This runs inside the frontend container on port 80.
# It is NOT the external-facing nginx (that lives in docker/nginx/).

server {
    listen       80;
    server_name  _;
    root         /usr/share/nginx/html;
    index        index.html;

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript;

    # Static assets — long cache (Vite hashes filenames)
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # SPA fallback — all routes → index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}
